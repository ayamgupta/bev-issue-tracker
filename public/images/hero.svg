      <stop offset="0" stop-color="#0b0e11"/>
      <stop offset="0.6" stop-color="#12161b"/>
      <stop offset="1" stop-color="#0f6e5c"/>
    </linearGradient>
    <radialGradient id="hero-glow" cx="0.5" cy="0.35" r="0.6">
      <stop offset="0" stop-color="#3ec9a7" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#3ec9a7" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="700" fill="url(#hero-bg)"/>
