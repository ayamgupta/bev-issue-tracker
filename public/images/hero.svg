  <text x="80" y="110" font-family="system-ui, sans-serif" font-size="52" font-weight="700" fill="#ffffff">Mahindra BEV lineup</text>
  <text x="80" y="150" font-family="system-ui, sans-serif" font-size="22" fill="#dde1e6">BE 6 · XEV 9e · XEV 9S</text>
