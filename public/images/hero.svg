<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 700" role="img" aria-labelledby="herotitle">
  <title id="herotitle">Mahindra BE 6, XEV 9e and XEV 9S — abstract lineup illustration</title>
  <defs>
