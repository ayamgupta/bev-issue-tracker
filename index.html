<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BEV Owners Issue Tracker</title>
    <meta
      name="description"
      content="Community-run issue tracker and analytics for Mahindra BE 6, XEV 9e and XEV 9S owners."
    />
    <script>
      // Pairs with public/404.html — decodes the re-encoded path back to a
      // normal URL before React Router mounts, so deep links and refreshes
      // on client-side routes work on GitHub Pages.
      ;(function (l) {
        if (l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&')
            })
            .join('?')
          window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash)
        }
      })(window.location)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
